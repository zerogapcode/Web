<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>Directorio Médico · MediCloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // ── Configuración Firebase ──────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDVL_VCV5qdXE8xZUZadrBzabjlD3DJLG0",
      authDomain: "medicloud-1cd0f.firebaseapp.com",
      projectId: "medicloud-1cd0f",
      storageBucket: "medicloud-1cd0f.firebasestorage.app",
      messagingSenderId: "337891468698",
      appId: "1:337891468698:web:179bf0842d6255dfd64623",
      measurementId: "G-VVSCC331VL"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── Estado global ───────────────────────────────────────────
    let todosLosMedicos = [];
    let filtroNombre    = '';
    let filtroPais      = '';
    let filtroEspecialidad = '';

    // ── Cargar médicos ──────────────────────────────────────────
    async function cargarMedicos() {
      mostrarSkeleton();
      try {
        const q = query(
          collection(db, 'directorio_medicos'),
          where('enDirectorio', '==', true)
        );
        const snap = await getDocs(q);
        todosLosMedicos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        poblarFiltros();
        renderMedicos();
      } catch (e) {
        console.error(e);
        mostrarError();
      }
    }

    // ── Poblar filtros dinámicos ────────────────────────────────
    function poblarFiltros() {
      const paises       = [...new Set(todosLosMedicos.map(m => m.pais).filter(Boolean))].sort();
      const especialidades = [...new Set(todosLosMedicos.map(m => m.especialidad).filter(Boolean))].sort();

      const selPais = document.getElementById('filtroPais');
      const selEsp  = document.getElementById('filtroEspecialidad');

      paises.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        selPais.appendChild(opt);
      });
      especialidades.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e; opt.textContent = e;
        selEsp.appendChild(opt);
      });
    }

    // ── Filtrar y renderizar ────────────────────────────────────
    function renderMedicos() {
      const filtrados = todosLosMedicos.filter(m => {
        const nombre = (m.nombre || '').toLowerCase();
        const matchNombre = !filtroNombre || nombre.includes(filtroNombre.toLowerCase());
        const matchPais   = !filtroPais || m.pais === filtroPais;
        const matchEsp    = !filtroEspecialidad || m.especialidad === filtroEspecialidad;
        return matchNombre && matchPais && matchEsp;
      });

      const grid    = document.getElementById('grid');
      const counter = document.getElementById('counter');
      grid.innerHTML = '';

      counter.textContent = filtrados.length === 1
        ? '1 médico encontrado'
        : `${filtrados.length} médicos encontrados`;

      if (filtrados.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <p>No se encontraron médicos con los filtros seleccionados.</p>
          </div>`;
        return;
      }

      filtrados.forEach((m, i) => {
        const card = crearCard(m, i);
        grid.appendChild(card);
      });
    }

    // ── Crear tarjeta de médico ─────────────────────────────────
    function crearCard(m, index) {
      const iniciales = (m.nombre || '?').split(' ')
        .slice(0, 2).map(w => w[0]).join('').toUpperCase();

      const colores = ['#4A9Ef8', '#2E7D5E', '#9B6B9E', '#E68A6F', '#1A5A7A'];
      const color   = colores[index % colores.length];

      const dias = (m.diasTrabajo || []).join(', ') || '—';
      const tel  = m.telefono || '';
      const waNum = tel.replace(/\D/g, '');

      const card = document.createElement('article');
      card.className = 'card';
      card.style.animationDelay = `${index * 60}ms`;

      card.innerHTML = `
        <div class="card-header" style="--accent: ${color}">
          <div class="avatar" style="background: ${color}">${iniciales}</div>
          <div class="card-meta">
            <h2 class="card-nombre">${m.nombre || 'Sin nombre'}</h2>
            <span class="card-especialidad">${m.especialidad || '—'}</span>
          </div>
        </div>
        <div class="card-body">
          ${m.consultorio ? `
          <div class="info-row">
            <span class="info-icon">🏥</span>
            <span>${m.consultorio}</span>
          </div>` : ''}
          ${m.pais ? `
          <div class="info-row">
            <span class="info-icon">📍</span>
            <span>${m.pais}</span>
          </div>` : ''}
          ${dias !== '—' ? `
          <div class="info-row">
            <span class="info-icon">📅</span>
            <span>${dias}</span>
          </div>` : ''}
          ${m.email ? `
          <div class="info-row">
            <span class="info-icon">✉️</span>
            <span>${m.email}</span>
          </div>` : ''}
        </div>
        <div class="card-actions">
          ${tel ? `
          <a href="tel:${tel}" class="btn btn-outline" title="Llamar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.7A2 2 0 012 .84h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.64a16 16 0 006.29 6.29l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            Llamar
          </a>
          <a href="https://wa.me/${waNum}" target="_blank" class="btn btn-whatsapp" title="WhatsApp">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.09.537 4.09 1.562 5.854L.057 23.428a.5.5 0 00.611.601l5.638-1.485A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.946 9.946 0 01-5.073-1.389l-.364-.217-3.767.993.993-3.696-.236-.38A9.946 9.946 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
            WhatsApp
          </a>` : ''}
          ${m.email ? `
          <a href="mailto:${m.email}" class="btn btn-outline" title="Email">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            Email
          </a>` : ''}
        </div>
      `;
      return card;
    }

    // ── Skeleton loader ─────────────────────────────────────────
    function mostrarSkeleton() {
      const grid = document.getElementById('grid');
      grid.innerHTML = Array(6).fill(`
        <div class="skeleton-card">
          <div class="sk sk-avatar"></div>
          <div class="sk-lines">
            <div class="sk sk-line sk-lg"></div>
            <div class="sk sk-line sk-md"></div>
            <div class="sk sk-line sk-sm"></div>
          </div>
        </div>`).join('');
    }

    function mostrarError() {
      document.getElementById('grid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <p>Error al cargar el directorio. Intenta de nuevo más tarde.</p>
        </div>`;
    }

    // ── Event listeners ─────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      cargarMedicos();

      document.getElementById('busqueda').addEventListener('input', e => {
        filtroNombre = e.target.value;
        renderMedicos();
      });
      document.getElementById('filtroPais').addEventListener('change', e => {
        filtroPais = e.target.value;
        renderMedicos();
      });
      document.getElementById('filtroEspecialidad').addEventListener('change', e => {
        filtroEspecialidad = e.target.value;
        renderMedicos();
      });
      document.getElementById('limpiar').addEventListener('click', () => {
        filtroNombre = filtroPais = filtroEspecialidad = '';
        document.getElementById('busqueda').value = '';
        document.getElementById('filtroPais').value = '';
        document.getElementById('filtroEspecialidad').value = '';
        renderMedicos();
      });
    });
  </script>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      transition: background-color 0.3s, color 0.3s;
    }

    /* ─── LIQUID GLASS BACKGROUND ─── */
    .liquid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: var(--blob-opacity);
      mix-blend-mode: screen;
      animation: float 20s infinite alternate ease-in-out;
    }

    .blob1 {
      width: 50vmax;
      height: 50vmax;
      background: var(--blob1-bg);
      top: -10%;
      left: -10%;
      animation-duration: 25s;
    }

    .blob2 {
      width: 60vmin;
      height: 60vmin;
      background: var(--blob2-bg);
      bottom: -5%;
      right: -5%;
      animation-duration: 18s;
      animation-delay: -5s;
    }

    .blob3 {
      width: 40vmax;
      height: 40vmax;
      background: var(--blob3-bg);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 22s;
      filter: blur(100px);
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(4%, 6%) scale(1.2); }
    }

    /* ─── HERO CON PARALLAX ───────────────── */
    .hero {
      position: relative;
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      overflow: hidden;
      z-index: 1;
      transform-style: preserve-3d;
    }

    .hero-content {
      position: relative;
      z-index: 3;
      max-width: 700px;
      transform: translateZ(0);
      will-change: transform;
    }

    .hero-bg-layer {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 120%;
      height: 140%;
      background: radial-gradient(ellipse at 30% 40%, rgba(74, 158, 248, 0.15), transparent 60%);
      filter: blur(60px);
      z-index: 1;
      pointer-events: none;
      will-change: transform;
    }

    .hero-bg-layer2 {
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 70% 60%, rgba(46, 125, 94, 0.15), transparent 60%);
      filter: blur(70px);
      z-index: 1;
      will-change: transform;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--logo-badge-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--logo-badge-border);
      border-radius: 60px;
      padding: 8px 20px 8px 8px;
      margin-bottom: 32px;
      box-shadow: 0 10px 30px -10px var(--shadow-color);
    }

    .logo-dot {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #4A9Ef8, #2E7D5E);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }

    .logo-badge span {
      font-size: 14px;
      font-weight: 500;
      color: var(--logo-badge-text);
      letter-spacing: 0.3px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 600;
      color: var(--hero-text);
      line-height: 1.1;
      margin-bottom: 20px;
      text-shadow: 0 4px 20px var(--shadow-color);
    }

    .hero h1 em {
      font-style: italic;
      background: var(--hero-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--hero-text-secondary);
      line-height: 1.7;
      max-width: 540px;
      margin: 0 auto;
      backdrop-filter: blur(5px);
    }

    /* ─── BARRA DE BÚSQUEDA GLASS ─────────────────── */
    .search-wrap {
      max-width: 1100px;
      margin: -40px auto 0;
      padding: 0 24px;
      position: relative;
      z-index: 20;
    }

    .search-card {
      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-medium);
      border-radius: 32px;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      box-shadow: 0 25px 50px -12px var(--shadow-color);
    }

    .search-input-wrap {
      flex: 2;
      min-width: 220px;
      position: relative;
    }

    .search-input-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: var(--input-bg);
      border: 1.5px solid var(--border-light);
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    input[type="text"]:focus {
      border-color: #4A9Ef8;
      background: var(--surface-glass-hover);
      box-shadow: 0 0 0 4px rgba(74, 158, 248, 0.2);
    }
    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    select {
      padding: 14px 40px 14px 18px;
      background: var(--input-bg);
      border: 1.5px solid var(--border-light);
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      appearance: none;
      cursor: pointer;
      backdrop-filter: blur(8px);
      background-image: var(--select-arrow);
      background-repeat: no-repeat;
      background-position: right 16px center;
      transition: all 0.2s;
    }
    select:focus {
      border-color: #4A9Ef8;
      background: var(--surface-glass-hover);
    }
    select option {
      background: var(--bg-body);
      color: var(--text-primary);
    }

    .btn-limpiar {
      padding: 12px 24px;
      background: var(--btn-limpiar-bg);
      border: 1.5px solid var(--border-medium);
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--btn-limpiar-color);
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    .btn-limpiar:hover {
      border-color: #4A9Ef8;
      background: rgba(74, 158, 248, 0.15);
      color: #4A9Ef8;
    }

    /* ─── SELECTOR DE TEMA ──────────────────────── */
    .theme-selector {
      padding: 12px 24px;
      background: var(--btn-limpiar-bg);
      border: 1.5px solid var(--border-medium);
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--btn-limpiar-color);
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      min-width: 140px;
    }
    .theme-selector:hover {
      border-color: #4A9Ef8;
      background: rgba(74, 158, 248, 0.15);
    }

    /* ─── MAIN Y CONTADOR ─────────────────────────── */
    main {
      max-width: 1200px;
      margin: 60px auto 80px;
      padding: 0 24px;
      position: relative;
      z-index: 10;
    }

    .counter {
      font-size: 14px;
      color: var(--counter-color);
      font-weight: 500;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding-left: 8px;
    }

    /* ─── GRID DE TARJETAS ────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* ─── TARJETA GLASS ───────────────────────────── */
    .card {
      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-light);
      border-radius: 32px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      animation: cardRise 0.5s ease both;
      box-shadow: 0 20px 40px -20px var(--shadow-color);
    }

    @keyframes cardRise {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      background: var(--surface-glass-hover);
      border-color: var(--border-accent);
      box-shadow: 0 30px 60px -20px #4A9Ef8;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--border-light);
      position: relative;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      color: white;
      box-shadow: 0 8px 20px var(--shadow-color);
    }

    .card-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .card-especialidad {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: var(--card-especialidad-color);
      background: var(--card-especialidad-bg);
      border-radius: 30px;
      padding: 4px 12px;
      margin-top: 6px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .card-body {
      padding: 20px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .info-icon {
      flex-shrink: 0;
      font-size: 16px;
      opacity: 0.8;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      padding: 12px 24px 24px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      backdrop-filter: blur(4px);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .btn-outline {
      background: var(--btn-outline-bg);
      border: 1px solid var(--btn-outline-border);
      color: var(--btn-outline-color);
    }
    .btn-outline:hover {
      background: rgba(74, 158, 248, 0.2);
      border-color: #4A9Ef8;
      color: #4A9Ef8;
    }

    .btn-whatsapp {
      background: var(--btn-whatsapp-bg);
      border: 1px solid var(--btn-whatsapp-border);
      color: var(--btn-whatsapp-color);
    }
    .btn-whatsapp:hover {
      background: var(--btn-whatsapp-hover-bg);
      border-color: var(--btn-whatsapp-hover-bg);
      color: var(--btn-whatsapp-hover-color);
      transform: scale(1.05);
    }

    /* ─── SKELETON LOADER ──────────────────────────── */
    .skeleton-card {
      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-light);
      border-radius: 32px;
      padding: 24px;
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .sk {
      background: var(--skeleton-bg);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 20px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .sk-avatar {
      width: 56px;
      height: 56px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .sk-lines {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 6px;
    }

    .sk-line {
      height: 14px;
    }

    .sk-lg { width: 70%; }
    .sk-md { width: 45%; }
    .sk-sm { width: 55%; }

    /* ─── EMPTY STATE ─────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      background: var(--empty-state-bg);
      border-radius: 48px;
      backdrop-filter: blur(8px);
      border: 1px solid var(--empty-state-border);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 10px var(--shadow-color));
    }

    .empty-state p {
      font-size: 16px;
      color: var(--text-secondary);
    }

    /* ─── FOOTER ──────────────────────────────────── */
    footer {
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--footer-border);
      font-size: 14px;
      color: var(--footer-text);
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 10;
    }

    footer strong {
      color: var(--footer-strong);
      font-weight: 600;
    }

    /* ─── RESPONSIVE ───────────────────────────────── */
    @media (max-width: 700px) {
      .search-card {
        flex-direction: column;
        align-items: stretch;
      }
      select, .btn-limpiar, .theme-selector {
        width: 100%;
      }
      .hero {
        min-height: 50vh;
        padding: 60px 20px;
      }
    }
  </style>
</head>
<body class="theme-auto">
  <!-- Capas líquidas de fondo -->
  <div class="liquid-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <!-- HERO CON PARALLAX -->
  <header class="hero" id="hero">
    <div class="hero-bg-layer" id="parallaxLayer1"></div>
    <div class="hero-bg-layer2" id="parallaxLayer2"></div>
    <div class="hero-content" id="parallaxContent">
      <div class="logo-badge">
        <div class="logo-dot">M</div>
        <span>MediCloud</span>
      </div>
      <h1>Directorio de <em>médicos</em> registrados</h1>
      <p>Encuentra especialistas verificados, consulta su información y contáctalos directamente.</p>
    </div>
  </header>

  <!-- BARRA DE BÚSQUEDA CON SELECTOR DE TEMA -->
  <div class="search-wrap">
    <div class="search-card">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="busqueda" placeholder="Buscar por nombre...">
      </div>
      <select id="filtroPais">
        <option value="">Todos los países</option>
      </select>
      <select id="filtroEspecialidad">
        <option value="">Todas las especialidades</option>
      </select>
      <button class="btn-limpiar" id="limpiar">✕ Limpiar</button>
      <!-- Selector de tema -->
      <select class="theme-selector" id="themeSwitcher">
        <option value="auto">🌓 Automático</option>
        <option value="light">☀️ Claro</option>
        <option value="dark">🌙 Oscuro</option>
      </select>
    </div>
  </div>

  <!-- GRID DE MÉDICOS -->
  <main>
    <p class="counter" id="counter">Cargando...</p>
    <div class="grid" id="grid"></div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>Directorio público de <strong>MediCloud</strong> · Todos los médicos listados han optado voluntariamente por aparecer en este directorio.</p>
  </footer>

  <!-- Script para parallax y selector de tema -->
  <script>
    (function() {
      // --- Parallax ---
      window.addEventListener('scroll', function() {
        const scrollY = window.scrollY;
        const layer1 = document.getElementById('parallaxLayer1');
        const layer2 = document.getElementById('parallaxLayer2');
        const content = document.getElementById('parallaxContent');

        if (layer1 && layer2 && content) {
          layer1.style.transform = `translateY(${scrollY * 0.1}px)`;
          layer2.style.transform = `translateY(${scrollY * 0.2}px)`;
          content.style.transform = `translateY(${scrollY * 0.05}px)`;
        }

        const blobs = document.querySelectorAll('.blob');
        blobs.forEach((blob, index) => {
          const speed = 0.03 + index * 0.01;
          blob.style.transform = `translateY(${scrollY * speed}px) translateX(${scrollY * speed * 0.5}px)`;
        });
      }, { passive: true });

      // --- Selector de tema ---
      const themeSwitcher = document.getElementById('themeSwitcher');
      const body = document.body;

      // Función para aplicar tema
      function setTheme(theme) {
        // Remover clases de tema actuales
        body.classList.remove('theme-auto', 'theme-light', 'theme-dark');
        body.classList.add(`theme-${theme}`);
        localStorage.setItem('selectedTheme', theme);
      }

      // Cargar tema guardado
      const savedTheme = localStorage.getItem('selectedTheme') || 'auto';
      themeSwitcher.value = savedTheme;
      setTheme(savedTheme);

      // Escuchar cambios en el selector
      themeSwitcher.addEventListener('change', (e) => {
        setTheme(e.target.value);
      });
    })();
  </script>
</body>
</html>
